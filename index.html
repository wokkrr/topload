<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Topload — card desk</title>
    <meta name="description" content="The card desk: live prices, listings, and sales for Pokémon, One Piece, and Yu-Gi-Oh — every marketplace, one book, and a binder for your collection." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <!-- Share cards (og:image is IP-absolute until the domain lands — update then) -->
    <meta property="og:title" content="TOPLOAD — card desk" />
    <meta property="og:description" content="Live prices, listings, and verified sales for Pokémon, One Piece, and Yu-Gi-Oh. Every marketplace, one book." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="http://157.230.157.53/icon-512.png" />
    <meta name="twitter:card" content="summary" />
    <!-- App-form (mobile doctrine): home-screen install runs standalone, no browser chrome -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#F5F2EB" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="TOPLOAD" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500;600&family=Libre+Caslon+Text:wght@400;700&display=swap" rel="stylesheet" />
    <style>
      @font-face {
        font-family: 'VCR OSD Mono';
        src: url('/fonts/VCR_OSD_MONO.ttf') format('truetype');
        font-weight: 400;
        font-display: swap;
      }
      html, body { margin: 0; background: var(--bg, #F5F2EB); }
      * { box-sizing: border-box; }
      button { font-family: inherit; }

      /* ── Boot mark (Kaleb, 2026-07-23): a card slides into a toploader
         while the app loads. Paints inline before any JS — it COVERS load
         time, never adds it; App.jsx fades it out on mount (600ms minimum
         so it reads intentional, not blinky). Scrap-if-wrong experiment. */
      #boot { position: fixed; inset: 0; z-index: 999; display: flex; flex-direction: column;
              align-items: center; justify-content: center; gap: 18px;
              background: #F5F2EB; transition: opacity .38s ease; }
      #boot.dark { background: #16130E; }
      #boot.done { opacity: 0; pointer-events: none; }
      #boot .wm { font: 600 17px Georgia, 'Times New Roman', serif; letter-spacing: 5px;
                  color: #1A1A1A; opacity: 0; animation: tl-wm .5s ease .45s forwards; }
      #boot.dark .wm { color: #EDE7D9; }
      @keyframes tl-wm { to { opacity: 1; } }
      #boot .card { animation: tl-slide .9s cubic-bezier(.3,.7,.3,1) .1s both; }
      @keyframes tl-slide { from { transform: translateY(-26px); opacity: 0; }
                            40% { opacity: 1; } to { transform: translateY(0); opacity: .85; } }
      @media (prefers-reduced-motion: reduce) {
        #boot .card { animation: none; opacity: .85; }
        #boot .wm { animation: none; opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div id="boot">
      <svg width="46" height="60" viewBox="0 0 32 42" aria-hidden="true">
        <rect x="3" y="5" width="26" height="34" rx="5" fill="none" stroke="#A87E2A" stroke-width="2.4"/>
        <rect class="card" x="9" y="11" width="14" height="22" rx="2.5" fill="#A87E2A"/>
      </svg>
      <div class="wm">TOPLOAD</div>
    </div>
    <script>
      /* theme + timing before the bundle loads — no flash either mode */
      try { if (localStorage.getItem('topload-theme') === 'dark') document.getElementById('boot').classList.add('dark'); } catch (e) {}
      window.__bootT0 = performance.now();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
